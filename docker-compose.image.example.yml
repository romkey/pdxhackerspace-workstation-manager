---
services:
  ansible:
    # Replace OWNER with your GitHub org/user.
    image: ghcr.io/OWNER/workstationmanager-ansible:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
    environment:
      ANSIBLE_CONFIG: /workspace/ansible.cfg
    stdin_open: true
    tty: true
