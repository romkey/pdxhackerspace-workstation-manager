---
services:
  ansible:
    build:
      context: .
      dockerfile: Dockerfile
    image: workstationmanager-ansible:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
    environment:
      ANSIBLE_CONFIG: /workspace/ansible.cfg
    stdin_open: true
    tty: true
